name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: witetec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/witetec_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-ci-do-not-use-in-production
      DOTNET_SERVICE_URL: http://localhost:5001
      PUBLIC_CHARGE_DEFAULT_EMAIL: noreply@witetec.com
      PUBLIC_CHARGE_DEFAULT_PHONE: "+5500000000000"
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand --forceExit

      - name: Build
        run: npm run build
